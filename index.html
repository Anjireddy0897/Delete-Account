<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Account - Face Cream AI</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
}
input, textarea {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
}
button {
    background: red;
    color: white;
    padding: 10px;
    border: none;
}
</style>

</head>

<body>

<div class="container">
<h2>Delete Account</h2>

<form onsubmit="deleteAccount(event)">
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<textarea placeholder="Reason (optional)"></textarea>

<button type="submit">Delete Account</button>
</form>

</div>

<script>
function deleteAccount(e) {
    e.preventDefault();
    alert("Your account deletion request has been submitted.");
}
</script>

</body>
</html>
